name: sustainable_living_guide
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^1.1.1         # Charting library (maintained)
  pdf: ^3.10.7
  printing: ^5.13.1
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  image_picker: ^0.8.7+5
  device_preview: ^1.3.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: 0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/box.jpg
    - assets/g1.jpg
    - assets/g2.jpg
    - assets/g3.png
    - assets/g4.jpg
    - assets/g5.png
    - assets/g6.webp
    - assets/g7.webp
    - assets/g8.webp
    - assets/g9.jpg
    - assets/g10.webp
    - assets/b1.jpg
    - assets/b2.jpg
    - assets/b3.jpg
    - assets/about.png